name: CI

on:
  # Trigger the workflow on push or pull request,
  # for any branch or version tag
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.5.0
      with:
        versionSpec: '6.x'
    
    - name: Use GitVersion
      id: gitversion # step id used as reference for output values
      uses: gittools/actions/gitversion/execute@v4.5.0
      with:
        configFilePath: ./GitVersion.yml

    - name: Update project version
      uses: roryprimrose/set-vs-sdk-project-version@v1.0.6
      with:
        version: ${{ steps.gitversion.outputs.semVer }}
        assemblyVersion: ${{ steps.gitversion.outputs.assemblySemVer }}
        fileVersion: ${{ steps.gitversion.outputs.majorMinorPatch }}
        informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}  
        
    - name: Setup dotnet v10.0
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '10.x' # SDK Version to use.

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore
    
    - name: Test
      run: dotnet test -c Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura

    - name: Generate coverage report
      # run: reportgenerator -reports:**/coverage.cobertura.xml -targetdir:Report -reporttypes:HtmlInline_AzurePipelines;Cobertura
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
      with:
        reports: "**/coverage*cobertura.xml"
        targetdir: "Report"
        reporttypes: "HtmlInline;Cobertura"
        tag: '${{ github.run_number }}_${{ github.run_id }}'
      if: github.event_name == 'pull_request' && github.repository_owner == 'roryprimrose'       # Don't run on forks

    - name: Publish coverage report
      uses: 5monkeys/cobertura-action@v14
      with:
        path: Report/Cobertura.xml
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        minimum_coverage: 75
      if: github.event_name == 'pull_request' && github.repository_owner == 'roryprimrose'       # Don't run on forks
      
    - name: Resolve project name
      shell: pwsh
      run: Add-Content -Path ${env:GITHUB_ENV} "`nprojectName=$(${env:GITHUB_REPOSITORY}.substring(${env:GITHUB_REPOSITORY}.IndexOf('/') + 1))" -Encoding utf8
      
    - name: Pack
      shell: pwsh
      run: |
        $staging = Join-Path $env:GITHUB_WORKSPACE "staging"
        dotnet pack ".\${{ env.projectName }}\${{ env.projectName }}.csproj" -c Release --no-build --include-symbols -o $staging
        dotnet pack ".\${{ env.projectName }}.NSubstitute\${{ env.projectName }}.NSubstitute.csproj" -c Release --no-build --include-symbols -o $staging

    - name: Publish build artifacts
      uses: actions/upload-artifact@v7.0.1
      with:
        name: packages
        path: staging
    
    - name: Write version
      shell: pwsh
      run: |
        Set-Content -Path version.txt -Value '${{ steps.gitversion.outputs.semVer }}' -Encoding utf8
    - name: Upload version
      uses: actions/upload-artifact@v7.0.1
      with:
        name: version
        path: version.txt

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository_owner == 'roryprimrose'       # Don't run on forks

    steps:
    - name: Download packages
      uses: actions/download-artifact@v8.0.1
      with:
        name: packages
      
    - name: Setup dotnet v10.0
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '10.x' # SDK Version to use.

    - name: Download version
      uses: actions/download-artifact@v8.0.1
      with:
        name: version

    - name: Read version
      shell: bash
      run: |
        value=`cat version.txt`
        echo NuGetVersionV2=$(echo $value) >> $GITHUB_ENV 
        
    - name: Publish to MyGet.org
      env: 
        MYGET_APIKEY: ${{ secrets.MYGET_APIKEY }}
      shell: pwsh
      run: |
        $packages = Get-ChildItem -Path . -Filter *.symbols.nupkg

        if ($packages.Count -eq 0) {
          throw "No symbol packages were found to publish."
        }

        $packages | ForEach-Object {
          dotnet nuget push $_.FullName --api-key $env:MYGET_APIKEY --source https://www.myget.org/F/neovolve/api/v2/package --no-service-endpoint
        }
      continue-on-error: true # just in case MyGet is down

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository_owner == 'roryprimrose' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
    
    - name: Download packages
      uses: actions/download-artifact@v8.0.1
      with:
        name: packages
      
    - name: Download version
      uses: actions/download-artifact@v8.0.1
      with:
        name: version

    - name: Read version
      shell: bash
      run: |
        value=`cat version.txt`
        echo NuGetVersionV2=$(echo $value) >> $GITHUB_ENV 
    
    - name: Resolve project name
      shell: pwsh
      run: Add-Content -Path ${env:GITHUB_ENV} "`nprojectName=$(${env:GITHUB_REPOSITORY}.substring(${env:GITHUB_REPOSITORY}.IndexOf('/') + 1))" -Encoding utf8
      
    - name: Setup dotnet v10.0
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '10.x' # SDK Version to use.

#    - name: Publish to GitHub
#      env: 
#        GPR_APIKEY: ${{ secrets.GPR_APIKEY }}
#      run: |
#        nuget push Neovolve.Streamline.${{ env.NuGetVersionV2 }}.symbols.nupkg $GPR_APIKEY -source https://nuget.pkg.github.com/roryprimrose/index.json
#        nuget push Neovolve.Streamline.NSubstitute.${{ env.NuGetVersionV2 }}.symbols.nupkg $GPR_APIKEY -source https://nuget.pkg.github.com/roryprimrose/index.json
      
    - name: Publish to NuGet.org
      env: 
        NUGET_APIKEY: ${{ secrets.NUGET_APIKEY }}
      shell: pwsh
      run: |
        $packages = Get-ChildItem -Path . -Filter *.symbols.nupkg

        if ($packages.Count -eq 0) {
          throw "No symbol packages were found to publish."
        }

        $packages | ForEach-Object {
          dotnet nuget push $_.FullName --api-key $env:NUGET_APIKEY --source https://api.nuget.org/v3/index.json
        }
#    - name: Publish to GitHub
#      env: 
#        GPR_APIKEY: ${{ secrets.GPR_APIKEY }}
#      run: nuget push *.*.symbols.nupkg $GPR_APIKEY -source https://nuget.pkg.github.com/roryprimrose/index.json
#      
#    - name: Publish to NuGet.org
#      env: 
#        NUGET_APIKEY: ${{ secrets.NUGET_APIKEY }}
#      run: nuget push *.*.symbols.nupkg $NUGET_APIKEY -source https://api.nuget.org/v3/index.json

    - name: Create release
      id: create_release
      uses: actions/create-release@v1.1.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.NuGetVersionV2 }}
        release_name: Release ${{ env.NuGetVersionV2 }}
        draft: false
        prerelease: ${{ contains(env.NuGetVersionV2, 'beta') }}

    - name: Resolve release assets
      shell: pwsh
      run: |
        $package = Get-ChildItem -Path . -Filter "${{ env.projectName }}.*.nupkg" |
          Where-Object { $_.Name -notlike "*.symbols.nupkg" -and $_.Name -notlike "${{ env.projectName }}.NSubstitute.*" } |
          Select-Object -First 1
        $symbolPackage = Get-ChildItem -Path . -Filter "${{ env.projectName }}.*.symbols.nupkg" |
          Where-Object { $_.Name -notlike "${{ env.projectName }}.NSubstitute.*" } |
          Select-Object -First 1

        if ($package -eq $null) {
          throw "The release package could not be found."
        }

        if ($symbolPackage -eq $null) {
          throw "The release symbol package could not be found."
        }

        Add-Content -Path $env:GITHUB_ENV -Value "packagePath=$($package.FullName)" -Encoding utf8
        Add-Content -Path $env:GITHUB_ENV -Value "packageName=$($package.Name)" -Encoding utf8
        Add-Content -Path $env:GITHUB_ENV -Value "symbolPackagePath=$($symbolPackage.FullName)" -Encoding utf8
        Add-Content -Path $env:GITHUB_ENV -Value "symbolPackageName=$($symbolPackage.Name)" -Encoding utf8
    
    - name: Upload release asset for package
      id: upload-release-asset-package
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.packagePath }}
        asset_name: ${{ env.packageName }}
        asset_content_type: application/zip
    
    - name: Upload release asset for symbol package
      id: upload-release-asset-symbolpackage
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.symbolPackagePath }}
        asset_name: ${{ env.symbolPackageName }}
        asset_content_type: application/zip